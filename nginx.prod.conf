# Nginx Configuration for Sadoksan Production
# Reverse proxy routing all services

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

    # Upstream services
    upstream storefront {
        least_conn;
        server storefront:3000 max_fails=3 fail_timeout=30s;
    }

    upstream admin {
        least_conn;
        server admin:3002 max_fails=3 fail_timeout=30s;
    }

    upstream api {
        least_conn;
        server api:3001 max_fails=3 fail_timeout=30s;
    }

    upstream python_service {
        least_conn;
        server python-service:5000 max_fails=3 fail_timeout=30s;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name sadoksaninsaat.com.tr www.sadoksaninsaat.com.tr;

        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name sadoksaninsaat.com.tr www.sadoksaninsaat.com.tr;

        # SSL certificates (replace with your certificates)
        ssl_certificate /etc/nginx/ssl/sadoksan.crt;
        ssl_certificate_key /etc/nginx/ssl/sadoksan.key;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Root location - storefront
        location / {
            limit_req zone=general_limit burst=20 nodelay;

            proxy_pass http://storefront;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;

            error_page 502 503 504 /500.html;
        }

        # Admin panel
        location /sadoksan-panel/ {
            limit_req zone=general_limit burst=20 nodelay;

            proxy_pass http://admin/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_request_buffering off;

            error_page 502 503 504 /500.html;
        }

        # API endpoints
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            # Health check endpoint (no rate limit)
            location /api/health {
                proxy_pass http://api;
                access_log off;
            }

            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts for long-running requests
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;

            error_page 502 503 504 /api_error.json;
        }

        # Python service — only PDF generation. NestJS proxies internally.
        # All other /api/proforma/* (history, create, send, delete) handled by NestJS above.
        location = /api/proforma/pdf/generate {
            allow 172.0.0.0/8;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://python_service/generate;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;
        }

        # Static uploads
        location /uploads/ {
            alias /usr/share/nginx/html/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Error pages
        error_page 502 /502.html;
        error_page 503 /503.html;
        error_page 504 /504.html;

        location = /502.html {
            return 502 '{"error": "Bad Gateway"}';
            add_header Content-Type application/json;
        }

        location = /503.html {
            return 503 '{"error": "Service Unavailable"}';
            add_header Content-Type application/json;
        }

        location = /504.html {
            return 504 '{"error": "Gateway Timeout"}';
            add_header Content-Type application/json;
        }

        location = /api_error.json {
            return 502 '{"status": "error", "message": "Service temporarily unavailable"}';
            add_header Content-Type application/json;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
