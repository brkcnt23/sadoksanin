version: '3.9'

services:
  # ============================================================================
  # DATABASE LAYER
  # ============================================================================

  postgres:
    image: postgres:15-alpine
    container_name: sadoksan-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-sadoksan_prod}
      POSTGRES_USER: ${DB_USER:-sadoksan}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sadoksan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sadoksan-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: sadoksan-redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sadoksan-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # NODE.JS SERVICES
  # ============================================================================

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: api
    container_name: sadoksan-api
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-sadoksan}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-sadoksan_prod}
      REDIS_URL: redis://redis:6379
      PYTHON_SERVICE_URL: http://python-service:5000
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sadoksan-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  storefront:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: storefront
    container_name: sadoksan-storefront
    restart: always
    environment:
      NODE_ENV: production
      NITRO_API_BASE: http://api:3001
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-https://api.sadoksan.com}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sadoksan-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  admin:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: admin
    container_name: sadoksan-admin
    restart: always
    environment:
      NODE_ENV: production
      NITRO_API_BASE: http://api:3001
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-https://api.sadoksan.com}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sadoksan-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================================
  # PYTHON SERVICE (PDF Generator)
  # ============================================================================

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: sadoksan-python
    restart: always
    environment:
      FLASK_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sadoksan-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================================
  # REVERSE PROXY (Nginx)
  # ============================================================================

  nginx:
    image: nginx:1.25-alpine
    container_name: sadoksan-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - storefront
      - admin
      - api
      - python-service
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sadoksan-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

# ============================================================================
# VOLUMES
# ============================================================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================

networks:
  sadoksan-network:
    driver: bridge
