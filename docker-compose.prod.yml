networks:
  sadoksan-network:
    driver: bridge
services:
  admin:
    build:
      args:
      - NUXT_APP_BASE_URL=${NUXT_ADMIN_BASE_URL:-/sadoksan-panel/}
      - ADMIN_API_BASE=${ADMIN_API_BASE:-/api}
      context: .
      dockerfile: apps/admin/Dockerfile
      target: production
    container_name: sadoksan-admin-prod
    depends_on:
      api:
        condition: service_healthy
    environment:
      ADMIN_API_BASE: ${ADMIN_API_BASE:-/api}
      NITRO_PORT: '3002'
      NODE_ENV: production
      PORT: '3002'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
      - CMD-SHELL
      - 'node -e "require(''http'').get(''http://localhost:3002/'', r => process.exit(r.statusCode >= 200 && r.statusCode < 400 ? 0 : 1)).on(''error'', () => process.exit(1))"'
      timeout: 5s
    logging:
      driver: json-file
      options:
        max-file: '5'
        max-size: 50m
    mem_limit: 512m
    networks:
    - sadoksan-network
    ports:
    - 127.0.0.1:3012:3002
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: sadoksan-api-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: postgresql://${POSTGRES_USER:-sadoksan}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sadoksan}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PYTHON_SERVICE_URL: http://python-service:5000
      REDIS_URL: redis://redis:6379
    healthcheck:
      interval: 15s
      retries: 5
      start_period: 40s
      test:
      - CMD-SHELL
      - 'node -e "require(''http'').get(''http://localhost:3001/api/health'', r => process.exit(r.statusCode
        === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"'
      timeout: 5s
    logging:
      driver: json-file
      options:
        max-file: '5'
        max-size: 50m
    mem_limit: 512m
    networks:
    - sadoksan-network
    ports:
    - 127.0.0.1:3010:3001
    restart: unless-stopped
    volumes:
    - uploads:/app/uploads
  nginx:
    container_name: sadoksan-nginx-prod
    depends_on:
    - storefront
    - admin
    - api
    - python-service
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD
      - nginx
      - -t
      timeout: 10s
    image: nginx:1.27-alpine
    logging:
      driver: json-file
      options:
        max-file: '5'
        max-size: 20m
    networks:
    - sadoksan-network
    ports:
    - 80:80
    - 443:443
    restart: unless-stopped
    volumes:
    - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    - ./ssl:/etc/nginx/ssl:ro
  postgres:
    container_name: sadoksan-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sadoksan}
      POSTGRES_INITDB_ARGS: --encoding=UTF8
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-sadoksan}
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-sadoksan}
      timeout: 5s
    image: postgres:15-alpine
    logging:
      driver: json-file
      options:
        max-file: '5'
        max-size: 50m
    networks:
    - sadoksan-network
    ports: []
    restart: unless-stopped
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./backups:/backups
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    command: flask run --host=0.0.0.0 --port=5000
    container_name: sadoksan-python-prod
    environment:
      FLASK_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 10s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:5000/health
      timeout: 5s
    logging:
      driver: json-file
      options:
        max-file: '3'
        max-size: 30m
    mem_limit: 256m
    networks:
    - sadoksan-network
    ports:
    - 127.0.0.1:3013:5000
    restart: unless-stopped
  redis:
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    container_name: sadoksan-redis-prod
    healthcheck:
      interval: 10s
      retries: 5
      test:
      - CMD
      - redis-cli
      - ping
      timeout: 5s
    image: redis:7-alpine
    logging:
      driver: json-file
      options:
        max-file: '3'
        max-size: 30m
    networks:
    - sadoksan-network
    ports: []
    restart: unless-stopped
    volumes:
    - redis_data:/data
  storefront:
    build:
      args:
      - NUXT_APP_BASE_URL=${NUXT_APP_BASE_URL:-/}
      context: .
      dockerfile: apps/storefront/Dockerfile
      target: production
    container_name: sadoksan-storefront-prod
    depends_on:
      api:
        condition: service_healthy
    environment:
      NITRO_PRESET: node-server
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://sadoksan.smartinnventory.com/api}
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 30s
      test:
      - CMD-SHELL
      - 'node -e "require(''http'').get(''http://localhost:3000/'', r => process.exit(r.statusCode >= 200 && r.statusCode < 400 ? 0 : 1)).on(''error'', () => process.exit(1))"'
      timeout: 5s
    logging:
      driver: json-file
      options:
        max-file: '5'
        max-size: 50m
    mem_limit: 512m
    networks:
    - sadoksan-network
    ports:
    - 127.0.0.1:3011:3000
    restart: unless-stopped
volumes:
  postgres_data: null
  redis_data: null
  uploads: null
