# ============================================================================
# Development orchestration
# All Node services share a single image built from ./Dockerfile.dev
# Source code is bind-mounted for HMR; node_modules are kept inside the
# container via anonymous volumes so host node_modules never override them.
# ============================================================================
x-node-base: &node-base
  build:
    context: .
    dockerfile: Dockerfile.dev
  image: sadoksan-dev:latest
  entrypoint: ["sh", "/app/docker-dev-entrypoint.sh"]
  networks:
    - sadoksan-network
  restart: unless-stopped

services:
  postgres:
    image: postgres:15-alpine
    container_name: sadoksan-postgres
    environment:
      POSTGRES_USER: sadoksan
      POSTGRES_PASSWORD: sadoksan_dev
      POSTGRES_DB: sadoksan_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U sadoksan -d sadoksan_dev"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s
    networks:
      - sadoksan-network

  redis:
    image: redis:7-alpine
    container_name: sadoksan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sadoksan-network

  api:
    <<: *node-base
    container_name: sadoksan-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://sadoksan:sadoksan_dev@postgres:5432/sadoksan_dev
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
      API_HOST: 0.0.0.0
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # bind-mount workspace manifests so dependency volumes track the host lockfile
      - ./package.json:/app/package.json:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      # bind-mount source for HMR
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      # anonymous volumes preserve in-container node_modules
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/api/dist
      - /app/packages/shared/node_modules
      - /app/packages/ui/node_modules
    command: ["pnpm", "-F", "@sadoksan/api", "dev"]

  storefront:
    <<: *node-base
    container_name: sadoksan-storefront
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NUXT_PUBLIC_API_BASE: http://localhost:3001
      # Container-friendly file watcher (Docker on Windows/macOS has no inotify)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - api
    volumes:
      - ./package.json:/app/package.json:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./apps/storefront:/app/apps/storefront
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/storefront/node_modules
      - /app/apps/storefront/.nuxt
      - /app/apps/storefront/.output
      - /app/packages/shared/node_modules
      - /app/packages/ui/node_modules
    command: ["pnpm", "-F", "@sadoksan/storefront", "dev"]

  admin:
    <<: *node-base
    container_name: sadoksan-admin
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      ADMIN_API_BASE: http://localhost:3001
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - api
    volumes:
      - ./package.json:/app/package.json:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ./pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/admin/node_modules
      - /app/apps/admin/.nuxt
      - /app/apps/admin/.output
      - /app/packages/shared/node_modules
      - /app/packages/ui/node_modules
    command: ["pnpm", "-F", "@sadoksan/admin", "dev"]

volumes:
  postgres_data:
  redis_data:

networks:
  sadoksan-network:
    driver: bridge
