version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sadoksan-postgres
    environment:
      POSTGRES_USER: sadoksan
      POSTGRES_PASSWORD: sadoksan_dev
      POSTGRES_DB: sadoksan_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U sadoksan -d sadoksan_dev"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s
    networks:
      - sadoksan-network

  redis:
    image: redis:7-alpine
    container_name: sadoksan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sadoksan-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: sadoksan-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://sadoksan:sadoksan_dev@postgres:5432/sadoksan_dev
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
      API_HOST: 0.0.0.0
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared:/app/packages/shared
      - /app/node_modules
    networks:
      - sadoksan-network
    command: sh -c "sleep 5 && pnpm -F @sadoksan/api run dev"

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      target: development
    container_name: sadoksan-storefront
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NUXT_PUBLIC_API_BASE: http://localhost:3001
    depends_on:
      - api
    volumes:
      - ./apps/storefront:/app/apps/storefront
      - ./packages/shared:/app/packages/shared
      - ./packages/ui:/app/packages/ui
      - /app/node_modules
    networks:
      - sadoksan-network
    command: npm run dev

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: development
    container_name: sadoksan-admin
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      ADMIN_API_BASE: http://localhost:3001
    depends_on:
      - api
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages/shared:/app/packages/shared
      - ./packages/ui:/app/packages/ui
      - /app/node_modules
    networks:
      - sadoksan-network
    command: npm run dev -p 3002

volumes:
  postgres_data:
  redis_data:

networks:
  sadoksan-network:
    driver: bridge
